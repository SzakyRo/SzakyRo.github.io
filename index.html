<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Data Expirare Cafea</title>
   <style>
       body {
           background-color: black;
           color: white;
           font-family: Arial, sans-serif;
       }
   </style>
</head>
<body>
   <div id="expiry-date-container"></div>
   <div id="countdown-container"></div>
   <img src="path/to/your/qr-code.png" alt="QR Code">
   <script>
       function displayExpiryDate() {
           var expiryDate = new Date("2025-01-27");
           var currentDate = new Date();

           if (currentDate < expiryDate) {
               var formattedExpiryDate = expiryDate.toDateString();
               document.getElementById("expiry-date-container").innerText = "Expiry Date: " + formattedExpiryDate;

               // Calculate the time remaining in seconds
               var timeRemaining = Math.floor((expiryDate - currentDate) / 1000);

               // Display the countdown
               var countdownContainer = document.getElementById("countdown-container");

               function updateCountdown() {
                   var days = Math.floor(timeRemaining / (60 * 60 * 24));
                   var hours = Math.floor((timeRemaining % (60 * 60 * 24)) / (60 * 60));
                   var minutes = Math.floor((timeRemaining % (60 * 60)) / 60);
                   var seconds = timeRemaining % 60;

                   countdownContainer.innerText = "Time Remaining: " + days + "d " + hours + "h " + minutes + "m " + seconds + "s";

                   if (timeRemaining > 0) {
                       timeRemaining--;
                       setTimeout(updateCountdown, 1000);
                   } else {
                       countdownContainer.innerText = "Coffee expired!";
                   }
               }

               updateCountdown();
           } else {
               document.getElementById("expiry-date-container").innerText = "This page has expired.";
           }
       }
       window.onload = displayExpiryDate;
   </script>
</body>
</html>
